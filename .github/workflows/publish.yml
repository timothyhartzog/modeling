name: Publish Quarto Website to GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Quarto
        uses: quarto-dev/quarto-actions/setup@v2

      - name: Verify QMD source files exist
        run: |
          count=$(find output/generated -name "*.qmd" | wc -l)
          echo "Found $count .qmd files in output/generated/"
          if [ "$count" -lt 52 ]; then
            echo "ERROR: Expected at least 52 .qmd files in output/generated/, found $count"
            echo "Run 'julia --project=. src/quarto_export.jl --stubs-only' to generate stubs."
            exit 1
          fi

      - name: Render Quarto project
        working-directory: ./output
        run: |
          quarto render

      - name: Upload artifact for GitHub Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./output/_site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v2
        environment:
          name: github-pages
          url: ${{ steps.deployment.outputs.page_url }}
