name: Security Scan

on:
  schedule:
    - cron: '0 9 * * 1'  # Weekly: every Monday at 09:00 UTC
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

jobs:
  # ─────────────────────────────────────────────────────────────────
  # 1. Secret Scanning — detect leaked credentials in git history
  # ─────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scanning (TruffleHog)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history required for complete secret scan

      - name: TruffleHog secret scan (incremental — push/PR)
        if: github.event_name == 'push' || github.event_name == 'pull_request'
        uses: trufflesecurity/trufflehog@v3.88.27
        with:
          path: ./
          base: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          head: HEAD
          extra_args: --only-verified

      - name: TruffleHog secret scan (full history — schedule/manual)
        if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
        uses: trufflesecurity/trufflehog@v3.88.27
        with:
          path: ./
          extra_args: --only-verified

  # ─────────────────────────────────────────────────────────────────
  # 2. CodeQL — static analysis of JavaScript/JSX components
  # ─────────────────────────────────────────────────────────────────
  codeql:
    name: CodeQL Analysis (JavaScript)
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read
      actions: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3.28.18
        with:
          languages: javascript
          queries: security-and-quality

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3.28.18
        with:
          category: javascript

  # ─────────────────────────────────────────────────────────────────
  # 3. Shell Script Security — lint deploy.sh with ShellCheck
  # ─────────────────────────────────────────────────────────────────
  shell-lint:
    name: Shell Script Security (ShellCheck)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck on all shell scripts
        run: |
          find . -name "*.sh" -not -path "./.git/*" -print0 | \
            xargs -0 shellcheck --severity=warning

  # ─────────────────────────────────────────────────────────────────
  # 4. Filesystem Vulnerability Scan — Trivy scans all dependency
  #    manifests (Julia Manifest.toml, package.json, etc.) and
  #    reports known CVEs via the OSV/GitHub Advisory databases.
  # ─────────────────────────────────────────────────────────────────
  trivy-scan:
    name: Trivy Filesystem Vulnerability Scan
    runs-on: ubuntu-latest

    permissions:
      security-events: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH,MEDIUM
          ignore-unfixed: true

      - name: Upload Trivy SARIF results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3.28.18
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category: trivy

  # ─────────────────────────────────────────────────────────────────
  # 5. NPM Dependency Audit — check React/D3 components for CVEs
  # ─────────────────────────────────────────────────────────────────
  npm-audit:
    name: NPM Dependency Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4.4.0
        with:
          node-version: '20'

      - name: Audit npm dependencies
        run: |
          if [ -f "interactive/package.json" ]; then
            cd interactive
            npm audit --audit-level=high
          else
            echo "No package.json found in interactive/ — skipping npm audit"
            echo "Install interactive dependencies first: cd interactive && npm install"
          fi
